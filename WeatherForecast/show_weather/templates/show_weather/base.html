{% load static %}
<!DOCTYPE html>
<html lang="en">

    {% block extra_css %} {% endblock %}
</head>
<body>
<div id="main_holder">

    <div id="footer"> (c) 2022 - Weather report crew </div>
    </div>

</div>

</html>
